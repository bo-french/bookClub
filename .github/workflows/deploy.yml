name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Backend/Dockerfile.prod'
      - 'Frontend/Dockerfile.prod'
      - '**.md'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy frontend'
        type: boolean
        default: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
              - '!Backend/Dockerfile.prod'
            frontend:
              - 'Frontend/**'
              - '!Frontend/Dockerfile.prod'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:${{ github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend to Fly.io
        id: fly-deploy
        run: |
          flyctl deploy --app bookclub-backend --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:${{ github.sha }} 2>&1 | tee deploy-output.txt
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            if grep -qi "unauthorized" deploy-output.txt; then
              echo "::error::Backend deployment failed — FLY_API_TOKEN is invalid or expired. Generate a new token with 'fly tokens create org' and update the FLY_BACKEND_API_TOKEN / FLY_FRONTEND_API_TOKEN secret in GitHub repo settings."
            elif grep -qi "no machines" deploy-output.txt || grep -qi "could not find" deploy-output.txt; then
              echo "::warning::Backend deployment failed — Fly.io machines may be stopped or scaled to zero. The Docker image was pushed successfully to DockerHub. You can manually deploy by running: flyctl deploy --app bookclub-backend --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:${{ github.sha }}"
              echo "machines_down=true" >> $GITHUB_OUTPUT
            else
              echo "::error::Backend deployment failed with an unexpected error. Check the deploy output above for details."
            fi
            exit $exit_code
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BACKEND_API_TOKEN }}
      - name: Verify backend is healthy
        if: steps.fly-deploy.outputs.machines_down != 'true'
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 10); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" https://bookclub-backend.fly.dev/ 2>/dev/null || echo "000")
            if [ "$status_code" != "000" ]; then
              echo "Backend is responding (HTTP $status_code)"
              exit 0
            fi
            echo "Attempt $i/10 — backend not responding yet, waiting 10s..."
            sleep 10
          done
          echo "::warning::Backend deployed but health check timed out. The Fly.io machine may still be starting up (auto_stop is enabled, so cold starts are expected)."

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:${{ github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy frontend to Fly.io
        id: fly-deploy
        run: |
          flyctl deploy --app bookclub-frontend --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:${{ github.sha }} 2>&1 | tee deploy-output.txt
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            if grep -qi "unauthorized" deploy-output.txt; then
              echo "::error::Frontend deployment failed — FLY_API_TOKEN is invalid or expired. Generate a new token with 'fly tokens create org' and update the FLY_BACKEND_API_TOKEN / FLY_FRONTEND_API_TOKEN secret in GitHub repo settings."
            elif grep -qi "no machines" deploy-output.txt || grep -qi "could not find" deploy-output.txt; then
              echo "::warning::Frontend deployment failed — Fly.io machines may be stopped or scaled to zero. The Docker image was pushed successfully to DockerHub. You can manually deploy by running: flyctl deploy --app bookclub-frontend --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:${{ github.sha }}"
              echo "machines_down=true" >> $GITHUB_OUTPUT
            else
              echo "::error::Frontend deployment failed with an unexpected error. Check the deploy output above for details."
            fi
            exit $exit_code
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_FRONTEND_API_TOKEN }}
      - name: Verify frontend is healthy
        if: steps.fly-deploy.outputs.machines_down != 'true'
        run: |
          echo "Waiting for frontend to become healthy..."
          for i in $(seq 1 10); do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" https://bookclub-frontend.fly.dev/ 2>/dev/null || echo "000")
            if [ "$status_code" != "000" ]; then
              echo "Frontend is responding (HTTP $status_code)"
              exit 0
            fi
            echo "Attempt $i/10 — frontend not responding yet, waiting 10s..."
            sleep 10
          done
          echo "::warning::Frontend deployed but health check timed out. The Fly.io machine may still be starting up (auto_stop is enabled, so cold starts are expected)."
