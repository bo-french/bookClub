name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Backend/Dockerfile.prod'
      - 'Frontend/Dockerfile.prod'
      - '**.md'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
              - '!Backend/Dockerfile.prod'
            frontend:
              - 'Frontend/**'
              - '!Frontend/Dockerfile.prod'

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:${{ github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app bookclub-backend --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:${{ github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app bookclub-frontend --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
