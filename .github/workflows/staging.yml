name: Base Image → Staging

on:
  push:
    branches: [main]
    paths:
      - 'Backend/Dockerfile.prod'
      - 'Frontend/Dockerfile.prod'

jobs:
  staging-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:staging
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app bookclub-backend-staging --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-backend:staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  staging-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:staging
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app bookclub-frontend-staging --image ${{ secrets.DOCKERHUB_USERNAME }}/bookclub-frontend:staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
