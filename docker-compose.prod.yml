services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["bun", "src/server.ts"]
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      NODE_ENV: production
      API_PORT: 4000

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["bun", "src/index.tsx"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      BUN_PUBLIC_CLERK_PUBLISHABLE_KEY: ${BUN_PUBLIC_CLERK_PUBLISHABLE_KEY}
      BUN_PUBLIC_API_URL: ${BUN_PUBLIC_API_URL}
      NODE_ENV: production
    depends_on:
      - backend

